# TESTE TEMPORÁRIO — validar que os secrets do Telegram funcionam.
# Disparado pelo app ao clicar em "Sim, rastrear 24h". Remover este workflow
# (e o gatilho em components/monitor_prompt.py) depois que o teste passar.
name: Teste do Telegram

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Envia mensagem de teste no Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN e/ou TELEGRAM_CHAT_ID ausentes nos secrets do repositório."
            exit 1
          fi
          resp=$(curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            --data-urlencode text="✅ Teste do Radar de Passagens Inteligentes: seu Telegram está conectado! Esta mensagem foi disparada pelo botão 'Sim, rastrear 24h'.")
          echo "$resp"
          echo "$resp" | grep -q '"ok":true' || { echo "::error::Telegram recusou o envio — confira o token e o chat_id."; exit 1; }
